<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Manager Lite</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  text-align: center;
  padding: 20px;
}

h1 { color: #00e676; }

input {
  padding: 10px;
  width: 220px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px 10px;
  margin: 4px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.add { background:#00c853; color:white; }
.winA { background:#2196f3; color:white; }
.draw { background:#ffb300; color:black; }
.winB { background:#9c27b0; color:white; }
.reset { background:#e53935; color:white; }

.match {
  background:#222;
  width:90%;
  max-width:700px;
  margin:10px auto;
  padding:10px;
  border-radius:8px;
}

.rating {
  font-size: 12px;
  opacity: 0.7;
}

table {
  margin: 20px auto;
  width: 95%;
  max-width: 1000px;
  border-collapse: collapse;
  background:#1c1c1c;
}

th {
  background:#00c853;
  color:black;
  padding:10px;
}

td {
  padding:10px;
  border-bottom:1px solid #333;
}
</style>
</head>

<body>

<h1>Football Manager Lite</h1>

<input id="teamInput" placeholder="Nome do time">
<button class="add" onclick="addTeam()">Adicionar time</button>
<button class="reset" onclick="resetChampionship()">Resetar</button>

<h2>Jogos</h2>
<div id="matches"></div>

<h2>Tabela</h2>

<table>
<thead>
<tr>
<th>Pos</th>
<th>Time</th>
<th>P</th>
<th>V</th>
<th>E</th>
<th>D</th>
<th>GP</th>
<th>GC</th>
<th>SG</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
let data = load();
let teams = data.teams || [];
let matches = data.matches || [];

// 🎯 cria time com força
function addTeam() {
  const name = document.getElementById("teamInput").value.trim();
  if (!name) return;

  teams.push({
    name,
    rating: randomRating(),
    p:0, v:0, e:0, d:0,
    gp:0, gc:0
  });

  document.getElementById("teamInput").value = "";

  generateMatches();
  save();
  render();
}

function randomRating() {
  return Math.floor(60 + Math.random() * 40); // 60–100
}

function generateMatches() {
  matches = [];

  for (let i = 0; i < teams.length; i++) {
    for (let j = i + 1; j < teams.length; j++) {
      matches.push({
        a: i,
        b: j,
        played: false
      });
    }
  }
}

// ⚽ lógica realista baseada em força
function play(i, result) {
  const m = matches[i];
  if (m.played) return;

  const A = teams[m.a];
  const B = teams[m.b];

  let golsA = 0;
  let golsB = 0;

  const diff = A.rating - B.rating;

  // 🎯 base de performance
  const baseA = Math.max(0, Math.round(1 + diff / 25 + Math.random() * 2));
  const baseB = Math.max(0, Math.round(1 - diff / 25 + Math.random() * 2));

  if (result === "A") {
    golsA = Math.max(baseA, baseB + 1);
    golsB = Math.floor(Math.random() * 2);

    A.v++; A.p += 3;
    B.d++;

  } else if (result === "B") {
    golsB = Math.max(baseB, baseA + 1);
    golsA = Math.floor(Math.random() * 2);

    B.v++; B.p += 3;
    A.d++;

  } else {
    golsA = baseA;
    golsB = baseB;

    if (golsA === golsB) {
      A.e++; B.e++;
      A.p++; B.p++;
    } else {
      // força empate real
      golsA = golsB = Math.min(golsA, golsB);
      A.e++; B.e++;
      A.p++; B.p++;
    }
  }

  A.gp += golsA;
  A.gc += golsB;

  B.gp += golsB;
  B.gc += golsA;

  m.played = true;

  save();
  render();
}

function renderMatches() {
  const div = document.getElementById("matches");
  div.innerHTML = "";

  matches.forEach((m, i) => {
    const el = document.createElement("div");
    el.className = "match";

    el.innerHTML = `
      <div class="rating">
        ${teams[m.a].name} (${teams[m.a].rating}) vs ${teams[m.b].name} (${teams[m.b].rating})
      </div><br>

      <button class="winA" onclick="play(${i},'A')">
        ${teams[m.a].name} vence
      </button>

      <button class="draw" onclick="play(${i},'E')">
        Empate
      </button>

      <button class="winB" onclick="play(${i},'B')">
        ${teams[m.b].name} vence
      </button>
    `;

    div.appendChild(el);
  });
}

function renderTable() {
  const t = document.getElementById("table");
  t.innerHTML = "";

  let sorted = [...teams].sort((a,b)=>
    b.p - a.p || (b.gp - b.gc) - (a.gp - a.gc)
  );

  sorted.forEach((x,i)=>{
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${i+1}</td>
      <td>${x.name}</td>
      <td>${x.p}</td>
      <td>${x.v}</td>
      <td>${x.e}</td>
      <td>${x.d}</td>
      <td>${x.gp}</td>
      <td>${x.gc}</td>
      <td>${x.gp - x.gc}</td>
    `;

    t.appendChild(row);
  });
}

function render() {
  renderMatches();
  renderTable();
}

function save() {
  localStorage.setItem("fm_lite", JSON.stringify({ teams, matches }));
}

function load() {
  const d = localStorage.getItem("fm_lite");
  return d ? JSON.parse(d) : { teams: [], matches: [] };
}

function resetChampionship() {
  teams = [];
  matches = [];
  localStorage.removeItem("fm_lite");
  render();
}

render();
</script>

</body>
</html>
