<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonato Profissional</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  text-align: center;
  padding: 20px;
}

h1 {
  color: #00e676;
  letter-spacing: 1px;
}

input {
  padding: 10px;
  width: 220px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px 10px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.add { background:#00c853; color:white; }
.reset { background:#e53935; color:white; }

.match {
  background:#1e1e1e;
  width:90%;
  max-width:700px;
  margin:10px auto;
  padding:12px;
  border-radius:10px;
  border: 1px solid #333;
  transition: 0.2s;
}

.match:hover {
  transform: scale(1.01);
}

.finished {
  opacity: 0.4;
  border-left: 4px solid #00e676;
  pointer-events: none;
}

.status {
  font-size: 12px;
  margin-top: 6px;
  color: #00e676;
}

.hidden {
  display: none;
}

table {
  margin: 20px auto;
  width: 95%;
  max-width: 1000px;
  border-collapse: collapse;
  background:#1c1c1c;
  border-radius: 10px;
  overflow: hidden;
}

th {
  background:#00e676;
  color:black;
  padding:12px;
  font-size: 14px;
}

td {
  padding:10px;
  border-bottom:1px solid #333;
}

tr:hover td {
  background:#2a2a2a;
}

.leader {
  background: rgba(0, 230, 118, 0.12);
  font-weight: bold;
}
</style>

</head>

<body>

<h1>Campeonato Profissional</h1>

<input id="teamInput" placeholder="Nome do time">
<button class="add" onclick="addTeam()">
