<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonato Profissional</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  text-align: center;
  padding: 20px;
}

h1 { color: #00e676; }

input {
  padding: 10px;
  width: 220px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 8px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.add { background:#00c853; color:white; }
.reset { background:#e53935; color:white; }

.match {
  background:#1e1e1e;
  width:90%;
  max-width:700px;
  margin:10px auto;
  padding:10px;
  border-radius:8px;
}

table {
  margin: 20px auto;
  width: 95%;
  max-width: 900px;
  border-collapse: collapse;
  background:#1c1c1c;
}

th {
  background:#00e676;
  color:black;
  padding:10px;
}

td {
  padding:10px;
  border-bottom:1px solid #333;
}
</style>
</head>

<body>

<h1>Campeonato Profissional</h1>

<input id="teamInput" placeholder="Nome do time">
<button class="add" onclick="addTeam()">Adicionar</button>
<button class="reset" onclick="resetChampionship()">Resetar</button>

<h2>Jogos</h2>
<div id="matches"></div>

<h2>Tabela</h2>
<table>
<thead>
<tr>
<th>Pos</th>
<th>Time</th>
<th>P</th>
<th>V</th>
<th>E</th>
<th>D</th>
<th>GP</th>
<th>GC</th>
<th>SG</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
let teams = [];
let matches = [];

function addTeam() {
  const input = document.getElementById("teamInput");
  const name = input.value.trim();
  if (!name) return;

  teams.push({
    name,
    p:0, v:0, e:0, d:0,
    gp:0, gc:0
  });

  input.value = "";
  generateMatches();
  render();
}

function generateMatches() {
  matches = [];

  for (let i=0;i<teams.length;i++){
    for (let j=i+1;j<teams.length;j++){
      matches.push({a:i,b:j,played:false});
    }
  }
}

function play(i,res){
  const m = matches[i];
  if (m.played) return;

  const A = teams[m.a];
  const B = teams[m.b];

  if (res==="a"){
    A.v++; A.p+=3;
    B.d++;
    A.gp++; B.gc++;
  }

  if (res==="b"){
    B.v++; B.p+=3;
    A.d++;
    B.gp++; A.gc++;
  }

  if (res==="e"){
    A.e++; B.e++;
    A.p++; B.p++;
  }

  m.played = true;
  render();
}

function renderMatches(){
  const div = document.getElementById("matches");
  div.innerHTML = "";

  matches.forEach((m,i)=>{
    if (m.played) return;

    const el = document.createElement("div");
    el.className="match";

    el.innerHTML = `
      ${teams[m.a].name} vs ${teams[m.b].name}<br><br>
      <button onclick="play(${i},'a')">A vence</button>
      <button onclick="play(${i},'e')">Empate</button>
      <button onclick="play(${i},'b')">B vence</button>
    `;

    div.appendChild(el);
  });
}

function renderTable(){
  const t = document.getElementById("table");
  t.innerHTML = "";

  let sorted = [...teams].sort((a,b)=>
    b.p - a.p || (b.gp-b.gc)-(a.gp-a.gc)
  );

  sorted.forEach((x,i)=>{
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${i+1}</td>
      <td>${x.name}</td>
      <td>${x.p}</td>
      <td>${x.v}</td>
      <td>${x.e}</td>
      <td>${x.d}</td>
      <td>${x.gp}</td>
      <td>${x.gc}</td>
      <td>${x.gp-x.gc}</td>
    `;

    t.appendChild(row);
  });
}

function render(){
  renderMatches();
  renderTable();
}

function resetChampionship(){
  teams = [];
  matches = [];
  render();
}
</script>

</body>
</html>
