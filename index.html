<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonato Profissional</title>

<style>
body{
  font-family:Arial;
  background:#0d0d0d;
  color:white;
  text-align:center;
  padding:20px;
}

h1{color:#00e676;}

input{
  padding:10px;
  width:220px;
  border:none;
  border-radius:6px;
}

button{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.add{background:#00c853;color:white;}
.reset{background:#e53935;color:white;}

.section{margin-top:20px;}

/* JOGOS */
.match{
  background:#1e1e1e;
  width:90%;
  max-width:700px;
  margin:10px auto;
  padding:12px;
  border-radius:10px;
  transition:0.25s;
  border-left:4px solid transparent;
  border-right:4px solid transparent;
}

.match:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* JOGO FINALIZADO (O QUE VOCÊ QUERIA) */
.match.done{
  opacity:0.55;
  border-left:5px solid #00e676;
  border-right:5px solid #00e676;
}

/* FINALIZADOS */
.card{
  background:#111;
  width:90%;
  max-width:700px;
  margin:10px auto;
  padding:10px;
  border-radius:10px;
  border-left:4px solid #00e676;
  border-right:4px solid #00e676;
}

/* TABELA SIMPLES (DEIXAMOS DEPOIS MAIS FORTE) */
table{
  margin:20px auto;
  width:95%;
  max-width:900px;
  border-collapse:collapse;
  background:#1c1c1c;
  border-radius:10px;
  overflow:hidden;
}

th{
  background:#00e676;
  color:black;
  padding:10px;
}

td{
  padding:10px;
  border-bottom:1px solid #333;
}
</style>
</head>

<body>

<h1>Campeonato Profissional</h1>

<input id="teamInput" placeholder="Nome do time">
<button class="add" onclick="addTeam()">Adicionar</button>
<button class="reset" onclick="resetChampionship()">Resetar</button>

<div class="section">
<h2>Jogos</h2>
<div id="matches"></div>
</div>

<div class="section">
<h2>Jogos Finalizados</h2>
<div id="finished"></div>
</div>

<script>
let teams=[];
let matches=[];

function addTeam(){
  const name=document.getElementById("teamInput").value.trim();
  if(!name) return;

  teams.push({name,p:0,v:0,e:0,d:0,gp:0,gc:0});

  document.getElementById("teamInput").value="";
  generateMatches();
  render();
}

function generateMatches(){
  matches=[];
  for(let i=0;i<teams.length;i++){
    for(let j=i+1;j<teams.length;j++){
      matches.push({a:i,b:j,played:false,sa:0,sb:0});
    }
  }
}

function play(i,res){
  const m=matches[i];
  if(m.played) return;

  const A=teams[m.a];
  const B=teams[m.b];

  let ga=0,gb=0;

  if(res==="a"){
    ga=2;
    A.v++;A.p+=3;
    B.d++;
  }
  else if(res==="b"){
    gb=2;
    B.v++;B.p+=3;
    A.d++;
  }
  else{
    ga=1;gb=1;
    A.e++;B.e++;
    A.p++;B.p++;
  }

  A.gp+=ga;A.gc+=gb;
  B.gp+=gb;B.gc+=ga;

  m.sa=ga;
  m.sb=gb;
  m.played=true;

  render();
}

function renderMatches(){
  const div=document.getElementById("matches");
  div.innerHTML="";

  matches.forEach((m,i)=>{
    if(m.played) return;

    const el=document.createElement("div");
    el.className="match";

    el.innerHTML=`
      ${teams[m.a].name} vs ${teams[m.b].name}<br><br>
      <button onclick="play(${i},'a')">${teams[m.a].name}</button>
      <button onclick="play(${i},'e')">Empate</button>
      <button onclick="play(${i},'b')">${teams[m.b].name}</button>
    `;

    div.appendChild(el);
  });
}

function renderFinished(){
  const div=document.getElementById("finished");
  div.innerHTML="";

  const finished = matches.filter(m=>m.played);

  if(finished.length===0){
    div.innerHTML="<p>Nenhum jogo finalizado ainda</p>";
    return;
  }

  finished.forEach(m=>{
    const el=document.createElement("div");
    el.className="card";

    el.innerHTML=`
      ${teams[m.a].name} <b>${m.sa}</b> x <b>${m.sb}</b> ${teams[m.b].name}
    `;

    div.appendChild(el);
  });
}

function render(){
  renderMatches();
  renderFinished();
}

function resetChampionship(){
  teams=[];
  matches=[];
  render();
}
</script>

</body>
</html>
